version: '3.8'

services:
  # 1. The Redis Broker (for Celery)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 2. The Django Web App
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_volume:/app/media
      - vector_volume:/app/vector_db
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  # 3. The Celery Worker (Uses the same build as 'web')
  worker:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
      - media_volume:/app/media
      - vector_volume:/app/vector_db
    env_file:
      - .env
    depends_on:
      - redis
      - web

volumes:
  media_volume:
  vector_volume:
  postgres_data: